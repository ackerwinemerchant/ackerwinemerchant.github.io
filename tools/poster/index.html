<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Acker Poster Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

@font-face{font-family:'Avenir';font-weight:400;font-style:normal;font-display:swap;src:url('https://ackerwinemerchant.github.io/fonts/Avenir-Book.woff2') format('woff2');}
@font-face{font-family:'Avenir';font-weight:500;font-style:normal;font-display:swap;src:url('https://ackerwinemerchant.github.io/fonts/Avenir-Medium.woff2') format('woff2');}
@font-face{font-family:'Avenir';font-weight:700;font-style:normal;font-display:swap;src:url('https://ackerwinemerchant.github.io/fonts/Avenir-Heavy.woff2') format('woff2');}
@font-face{font-family:'Avenir';font-weight:800;font-style:normal;font-display:swap;src:url('https://ackerwinemerchant.github.io/fonts/Avenir-Black.woff2') format('woff2');}
@font-face{font-family:'Avenir';font-weight:400;font-style:italic;font-display:swap;src:url('https://ackerwinemerchant.github.io/fonts/Avenir-BookOblique.woff2') format('woff2');}

.akp-root *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
.akp-root{
  --akp-wine:#801747;--akp-wine-dark:#66103a;
  --akp-black:#212121;--akp-gold:#BEAD85;--akp-grey:#F2F2F2;
  --akp-ink:#212121;--akp-paper:#fff;--akp-bg:#f4f1ee;--akp-line:#e4ddd6;--akp-muted:#8a817a;
  --akp-latin:'Avenir',sans-serif;
  font-family:var(--akp-latin);color:var(--akp-ink);background:var(--akp-bg);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
}
.akp-topbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--akp-paper);border-bottom:1px solid var(--akp-line);z-index:30;}
.akp-brand{display:flex;align-items:baseline;gap:9px;}
.akp-brand b{font-size:17px;letter-spacing:.02em;color:var(--akp-wine);}
.akp-brand span{font-size:11px;letter-spacing:.16em;color:var(--akp-muted);text-transform:uppercase;font-weight:700;}
.akp-link{font-size:13px;font-weight:700;color:var(--akp-muted);background:none;border:none;cursor:pointer;}
.akp-pill{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:13px;font-weight:800;color:#fff;background:var(--akp-wine);border:none;border-radius:999px;padding:9px 15px;cursor:pointer;}
.akp-pill:active{transform:translateY(1px);}
.akp-pill svg{width:15px;height:15px;}
.akp-shell{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;}
.akp-controls{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 100px;background:var(--akp-paper);}
.akp-preview-pane{order:-1;flex:0 0 auto;background:var(--akp-bg);padding:10px 12px;box-shadow:0 3px 10px rgba(0,0,0,.05);}
.akp-dims{text-align:center;font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--akp-muted);text-transform:uppercase;margin-bottom:8px;}
.akp-frame{display:flex;justify-content:center;}
.akp-canvas{overflow:hidden;position:relative;border-radius:4px;box-shadow:0 6px 22px rgba(0,0,0,.12);}
.akp-pen{position:absolute;top:8px;right:8px;width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.93);box-shadow:0 1px 6px rgba(0,0,0,.28);display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--akp-wine);z-index:4;}
.akp-pen svg{width:17px;height:17px;}
.akp-pen.akp-on{background:var(--akp-wine);color:#fff;}
.akp-canvas.akp-has-hero:hover .akp-pen{display:flex;}
.akp-canvas.akp-editing .akp-pen{display:flex;}
@media(hover:none){.akp-canvas.akp-has-hero .akp-pen{display:flex;opacity:.95;}}
.akp-canvas.akp-editing{cursor:move;touch-action:none;}
.akp-canvas.akp-editing .akp-poster{outline:2px solid var(--akp-wine);outline-offset:-2px;}
.akp-pos-hint{position:absolute;left:8px;right:54px;top:8px;background:rgba(33,33,33,.84);color:#fff;font-size:11px;font-weight:600;line-height:1.3;padding:7px 10px;border-radius:8px;display:none;z-index:4;}
.akp-canvas.akp-editing .akp-pos-hint{display:block;}
.akp-field{margin-bottom:15px;}
.akp-label{display:block;font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--akp-muted);margin-bottom:6px;}
.akp-input,.akp-textarea,.akp-select{width:100%;border:1px solid var(--akp-line);border-radius:11px;padding:13px;font-size:16px;font-family:inherit;color:var(--akp-ink);background:#fbf9f7;}
.akp-input:focus,.akp-textarea:focus,.akp-select:focus{outline:none;border-color:var(--akp-wine);box-shadow:0 0 0 3px rgba(128,23,71,.12);background:#fff;}
.akp-textarea{resize:vertical;min-height:60px;line-height:1.35;}
.akp-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.akp-help{font-size:12px;color:var(--akp-muted);margin-top:6px;line-height:1.45;}
.akp-tabsbar{position:sticky;top:0;z-index:6;background:var(--akp-paper);padding:12px 0 10px;}
.akp-tabs{display:flex;gap:6px;background:#efe9e3;border-radius:12px;padding:5px;}
.akp-tabs button{flex:1;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:800;color:var(--akp-muted);padding:11px 6px;border-radius:9px;cursor:pointer;}
.akp-tabs button.akp-on{background:#fff;color:var(--akp-wine);box-shadow:0 1px 5px rgba(0,0,0,.1);}
.akp-panel{animation:akpfade .18s ease;}
@keyframes akpfade{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.akp-section{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--akp-wine);margin:22px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--akp-line);}
.akp-section:first-child{margin-top:4px;}
.akp-seg{display:flex;border:1px solid var(--akp-line);border-radius:11px;overflow:hidden;}
.akp-seg button{flex:1;font-family:inherit;font-size:13px;font-weight:700;padding:12px 8px;background:#fbf9f7;border:none;border-right:1px solid var(--akp-line);cursor:pointer;color:var(--akp-muted);}
.akp-seg button:last-child{border-right:none;}
.akp-seg button.akp-on{background:var(--akp-wine);color:#fff;}
.akp-drop{border:1.5px dashed var(--akp-line);border-radius:12px;padding:20px;text-align:center;cursor:pointer;background:#fbf9f7;}
.akp-drop:active{border-color:var(--akp-wine);}
.akp-drop.akp-drag{border-color:var(--akp-wine);background:#fff;box-shadow:0 0 0 3px rgba(128,23,71,.14);}
.akp-drop.akp-has{padding:8px;}
.akp-drop-hint{font-size:13px;color:var(--akp-muted);line-height:1.5;}
.akp-drop-hint b{color:var(--akp-wine);}
.akp-thumb{max-width:100%;max-height:130px;border-radius:8px;display:block;margin:0 auto;}
.akp-swatches{display:flex;gap:11px;align-items:center;margin-bottom:10px;}
.akp-swatch{width:38px;height:38px;border-radius:9px;border:2px solid #fff;box-shadow:0 0 0 1px var(--akp-line);cursor:pointer;}
.akp-swatch.akp-sel{box-shadow:0 0 0 2px var(--akp-wine);}
.akp-color-row{display:flex;align-items:center;gap:10px;}
.akp-color-row input[type=color]{width:46px;height:42px;border:1px solid var(--akp-line);border-radius:10px;padding:2px;background:#fff;cursor:pointer;}
.akp-actionbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;gap:10px;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--akp-line);}
.akp-btn{flex:1;font-family:inherit;font-weight:800;font-size:15px;border-radius:12px;padding:14px;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;gap:8px;justify-content:center;}
.akp-btn:active{transform:translateY(1px);}
.akp-btn-primary{background:var(--akp-wine);color:#fff;}
.akp-btn-ghost{background:#fff;color:var(--akp-ink);border-color:var(--akp-line);}
.akp-btn:disabled{opacity:.5;}
.akp-btn svg{width:17px;height:17px;}
.akp-status{font-size:13px;font-weight:700;margin-top:12px;min-height:18px;}
.akp-status.ok{color:#1a7a3c;}.akp-status.err{color:#b3261e;}.akp-status.busy{color:var(--akp-wine);}
.akp-note{font-size:12px;color:var(--akp-muted);line-height:1.5;margin-top:8px;}
.akp-hide{display:none !important;}
@media(min-width:980px){
  .akp-root{height:auto;display:block;overflow:visible;}
  .akp-shell{flex:none;display:grid;grid-template-columns:430px 1fr;align-items:start;}
  .akp-controls{flex:none;overflow:visible;padding:0 24px 24px;min-height:calc(100vh - 56px);border-right:1px solid var(--akp-line);}
  .akp-preview-pane{order:0;flex:none;position:sticky;top:80px;padding:28px;box-shadow:none;background:transparent;}
  .akp-actionbar{position:static;border-top:none;background:transparent;padding:18px 0 0;}
  .akp-tabsbar{background:var(--akp-paper);}
}
.akp-poster{
  --akp-w:1242px;--akp-h:1660px;--akp-s:1;--akp-cjk:'Noto Sans SC';
  width:var(--akp-w);height:var(--akp-h);background:#fff;display:flex;flex-direction:column;
  overflow:hidden;transform-origin:top left;font-family:var(--akp-latin),var(--akp-cjk),sans-serif;
}
.akp-hero{flex:1 1 auto;min-height:0;background:#eceae8 center/cover no-repeat;}
.akp-hero-empty{display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:#b8b0a8;font-size:calc(34px*var(--akp-s));font-weight:600;}
.akp-info{flex:0 0 auto;display:flex;align-items:flex-start;gap:calc(24px*var(--akp-s));padding:calc(48px*var(--akp-s)) calc(58px*var(--akp-s)) calc(36px*var(--akp-s));}
.akp-left{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;justify-content:flex-end;}
.akp-right{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;text-align:right;}
.akp-vintage{font-size:calc(38px*var(--akp-s));font-weight:800;color:var(--akp-wine);margin-bottom:calc(12px*var(--akp-s));white-space:pre-line;}
.akp-name{font-size:calc(52px*var(--akp-s));font-weight:800;color:#212121;line-height:1.04;letter-spacing:-.01em;word-break:break-word;white-space:pre-line;}
.akp-subtitle{font-size:calc(44px*var(--akp-s));font-weight:400;color:#212121;margin-top:calc(8px*var(--akp-s));line-height:1.1;white-space:pre-line;}
.akp-price-label{font-size:calc(26px*var(--akp-s));font-weight:500;margin-bottom:calc(2px*var(--akp-s));}
.akp-pl-cn{color:var(--akp-wine);font-weight:600;}
.akp-pl-en{color:#212121;}
.akp-price{display:flex;align-items:flex-start;justify-content:flex-end;color:var(--akp-wine);font-weight:800;line-height:.9;letter-spacing:-.02em;}
.akp-cur{font-size:calc(50px*var(--akp-s));line-height:1;margin-top:calc(9px*var(--akp-s));margin-right:calc(3px*var(--akp-s));}
.akp-amt{font-size:calc(112px*var(--akp-s));line-height:.82;}
.akp-badge-row{display:flex;align-items:center;justify-content:flex-end;gap:calc(22px*var(--akp-s));margin-top:calc(18px*var(--akp-s));}
.akp-brandstack{display:flex;flex-direction:column;align-items:flex-end;gap:calc(28px*var(--akp-s));}
.akp-badge{background:var(--akp-wine);color:#fff;border-radius:999px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;line-height:1.04;padding:calc(13px*var(--akp-s)) calc(32px*var(--akp-s));}
.akp-badge-cn{font-size:calc(30px*var(--akp-s));font-weight:700;}
.akp-badge-en{font-size:calc(17px*var(--akp-s));font-weight:500;letter-spacing:.02em;margin-top:calc(2px*var(--akp-s));}
.akp-badge-lg{padding:calc(16px*var(--akp-s)) calc(48px*var(--akp-s));}
.akp-badge-lg .akp-badge-cn{font-size:calc(40px*var(--akp-s));}
.akp-logo{display:inline-flex;align-items:center;}
.akp-logo-svg,.akp-logo-img{display:block;height:auto;}
.akp-logo-sm .akp-logo-svg,.akp-logo-sm .akp-logo-img{width:calc(208px*var(--akp-s));}
.akp-logo-lg .akp-logo-svg,.akp-logo-lg .akp-logo-img{width:calc(300px*var(--akp-s));}
.akp-footer{flex:0 0 auto;min-height:calc(64px*var(--akp-s));background:var(--akp-gold);color:#fff;display:flex;align-items:center;padding:calc(12px*var(--akp-s)) calc(46px*var(--akp-s));}
.akp-footer-cn{font-size:calc(22px*var(--akp-s));font-weight:600;margin-right:calc(16px*var(--akp-s));}
.akp-footer-en{font-size:calc(22px*var(--akp-s));font-weight:500;font-style:italic;}
.akp-modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;}
.akp-modal-card{background:#fff;width:100%;max-width:640px;max-height:88vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;overflow:hidden;}
.akp-modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--akp-line);}
.akp-modal-head b{font-size:16px;color:var(--akp-wine);}
.akp-modal-search{padding:12px 18px 4px;}
.akp-modal-search input{width:100%;}
.akp-modal-status{padding:11px 18px;font-size:13px;color:var(--akp-muted);}
.akp-modal-grid{padding:6px 18px 26px;overflow:auto;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.akp-pcard{position:relative;border:1px solid var(--akp-line);border-radius:12px;overflow:hidden;cursor:pointer;background:#fbf9f7;}
.akp-pcard:active{transform:scale(.98);}
.akp-pcard img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:#eceae8;}
.akp-pcard-meta{padding:8px 10px;}
.akp-pcard-name{font-size:12px;font-weight:700;color:#212121;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.akp-pcard-sub{font-size:11px;color:var(--akp-muted);margin-top:3px;}
.akp-del{position:absolute;top:7px;right:7px;width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.94);box-shadow:0 1px 5px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#b3261e;}
.akp-del svg{width:15px;height:15px;}
@media(min-width:560px){.akp-modal-grid{grid-template-columns:1fr 1fr 1fr;}}
@media(min-width:980px){.akp-modal{align-items:center;}.akp-modal-card{border-radius:18px;}}
.akp-export-host{position:fixed;left:-99999px;top:0;pointer-events:none;}
</style>
</head>

              <div class="akp-left">

</div>
<script>
(function(){
  "use strict";
  var CONFIG = { ENDPOINT: "https://script.google.com/macros/s/AKfycbwhjxT7Z7yJao9pgo3pN5P57ruA4n0YNo4UQsIw-6-sBnpPEjYWAVlGk83HE5Uf1l3F/exec" };
  var SIZES = { "default":{w:1242,h:1660},"whatsapp":{w:1080,h:1440},"status":{w:1080,h:1920},"ig":{w:1080,h:1350},"square":{w:1080,h:1080} };
  var BASE_W = 1242, curW = 1242, curH = 1660;
  var state = { variant:"price", lang:"sc" };
  var currentRecordId = "";   // set when a saved poster is loaded / created → next save updates it
  function $(id){ return document.getElementById(id); }
  function val(id){ return $(id).value; }
  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function priceParts(raw){ var m=String(raw).match(/^(\s*[^\d]*)(.*)$/); var cur=m?m[1].trim():"", amt=m?m[2]:String(raw); return '<span class="akp-cur">'+esc(cur)+'</span><span class="akp-amt">'+esc(amt)+'</span>'; }
  var poster = $("akpPoster"), rootEl = document.querySelector(".akp-root");
  var LOGO_DEFAULT = $("akpLogoTpl").innerHTML;
  var logoHTML = LOGO_DEFAULT;
  var heroDataUrl = "", logoDataUrl = "";
  var heroPosX = 50, heroPosY = 50;
  function logoBlock(sizeClass){ return '<span class="akp-logo '+sizeClass+'">'+logoHTML+'</span>'; }
  function renderRight(){
    var lang = state.lang, html = "";
    if(state.variant === "price"){
      if(lang === "en"){
        html += '<div class="akp-price-label"><span id="pPlEn" class="akp-pl-en">'+esc(val("akpPriceLabelEn"))+'</span></div>';
      } else {
        html += '<div class="akp-price-label"><span id="pPlCn" class="akp-pl-cn">'+esc(val("akpPriceLabelCn"))+'</span> <span id="pPlEn" class="akp-pl-en">'+esc(val("akpPriceLabelEn"))+'</span></div>';
      }
      html += '<div id="pPrice" class="akp-price">'+priceParts(val("akpPrice"))+'</div>';
      html += '<div class="akp-badge-row"><span class="akp-badge" id="pBadge"></span>'+logoBlock("akp-logo-sm")+'</div>';
    } else {
      html += '<div class="akp-brandstack">'+logoBlock("akp-logo-lg")+'<span class="akp-badge akp-badge-lg" id="pBadge"></span></div>';
    }
    $("akpRight").innerHTML = html;
    updateBadge();
  }
  function updateBadge(){
    var span = $("pBadge"); if(!span) return;
    var lang = state.lang;
    if(lang === "en"){ span.innerHTML = '<span class="akp-badge-cn">'+esc(val("akpBadgeEn"))+'</span>'; }
    else if(state.variant === "price"){ span.innerHTML = '<span class="akp-badge-cn">'+esc(val("akpBadgeCn"))+'</span><span class="akp-badge-en">'+esc(val("akpBadgeEn"))+'</span>'; }
    else { span.innerHTML = '<span class="akp-badge-cn">'+esc(val("akpBadgeCn"))+'</span>'; }
  }
  function setIf(id, text){ var e=$(id); if(e) e.textContent = text; }
  function setVintage(v){ var e=$("pVintage"); if(!e) return; e.textContent=v; e.style.display=(v&&String(v).trim())?"":"none"; }
  function setSubtitle(v){ var e=$("pSubtitle"); if(!e) return; e.textContent=v; e.style.display=(v&&String(v).trim())?"":"none"; }
  function refreshFooter(){
    $("pFootCn").style.display = (state.lang === "en") ? "none" : "";
    $("pFootCn").textContent = val("akpFooterCn");
    $("pFootEn").textContent = val("akpFooterEn");
  }
  function bind(id, fn){ $(id).addEventListener("input", function(){ fn(this.value); }); }
  bind("akpVintage",  setVintage);
  bind("akpName",     function(v){ setIf("pName", v); });
  bind("akpSubtitle", setSubtitle);
  bind("akpPrice",    function(v){ var e=$("pPrice"); if(e) e.innerHTML = priceParts(v); });
  bind("akpPriceLabelCn", function(v){ setIf("pPlCn", v); });
  bind("akpPriceLabelEn", function(v){ setIf("pPlEn", v); });
  bind("akpBadgeCn", updateBadge);
  bind("akpBadgeEn", updateBadge);
  bind("akpFooterCn", refreshFooter);
  bind("akpFooterEn", refreshFooter);
  function toggle(cls, show){ Array.prototype.forEach.call(document.querySelectorAll(cls), function(el){ el.classList.toggle("akp-hide", !show); }); }
  function applyVariant(v){
    state.variant = v;
    toggle(".akp-price-field", v === "price");
    Array.prototype.forEach.call($("akpVariantSeg").children, function(b){ b.classList.toggle("akp-on", b.getAttribute("data-v") === v); });
    renderRight(); fitPreview();
  }
  $("akpVariantSeg").addEventListener("click", function(e){ var b=e.target.closest("button"); if(b) applyVariant(b.getAttribute("data-v")); });
  function applyLang(l, keepText){
    state.lang = l;
    if(l !== "en"){
      if(!keepText){
        $("akpPriceLabelCn").value = (l === "tc") ? "每瓶價格（港幣）" : "每瓶价格（港币）";
        $("akpBadgeCn").value      = (l === "tc") ? "香港現貨" : "香港现货";
        $("akpFooterCn").value     = "僅限18歲以上人士。請理性享用美酒";
      }
      poster.style.setProperty("--akp-cjk", (l === "tc") ? "'Noto Sans TC'" : "'Noto Sans SC'");
    }
    toggle(".akp-cn-field", l !== "en");
    Array.prototype.forEach.call($("akpLangSeg").children, function(b){ b.classList.toggle("akp-on", b.getAttribute("data-l") === l); });
    renderRight(); refreshFooter();
    if(document.fonts && document.fonts.ready){ document.fonts.ready.then(fitPreview); } else { fitPreview(); }
  }
  $("akpLangSeg").addEventListener("click", function(e){ var b=e.target.closest("button"); if(b) applyLang(b.getAttribute("data-l")); });
  function applySize(key){
    var s = SIZES[key] || SIZES["default"];
    curW = s.w; curH = s.h;
    poster.style.setProperty("--akp-w", curW+"px");
    poster.style.setProperty("--akp-h", curH+"px");
    poster.style.setProperty("--akp-s", (curW/BASE_W).toFixed(4));
    $("akpDims").textContent = curW+" × "+curH+" px";
    fitPreview();
  }
  $("akpSize").addEventListener("change", function(){ applySize(this.value); });
  function readImage(file, cb){ var r=new FileReader(); r.onload=function(){ cb(r.result); }; r.readAsDataURL(file); }
  function downscale(dataUrl, maxDim, cb){
    var img=new Image();
    img.onload=function(){
      var w=img.width, h=img.height, sc=Math.min(1, maxDim/Math.max(w,h));
      if(sc>=1){ cb(dataUrl); return; }
      var cw=Math.round(w*sc), ch=Math.round(h*sc);
      var c=document.createElement("canvas"); c.width=cw; c.height=ch;
      c.getContext("2d").drawImage(img,0,0,cw,ch);
      cb(c.toDataURL("image/jpeg",0.9));
    };
    img.onerror=function(){ cb(dataUrl); };
    img.src=dataUrl;
  }
  function applyHeroPos(){ var h=$("akpHero"); if(h) h.style.backgroundPosition = heroPosX+"% "+heroPosY+"%"; }
  function showHero(data){
    heroDataUrl = data;
    $("akpHero").style.backgroundImage = "url('"+data+"')";
    var em=$("akpHeroEmpty"); if(em) em.style.display="none";
    $("akpHeroDrop").classList.add("akp-has");
    $("akpHeroHint").innerHTML = "<img class='akp-thumb' src='"+data+"'>";
    $("akpCanvas").classList.add("akp-has-hero");
    heroPosX = 50; heroPosY = 50; applyHeroPos();
  }
  function handleHeroFile(f){ if(!f || f.type.indexOf("image")!==0) return; readImage(f, function(data){ downscale(data, 1600, showHero); }); }
  function handleLogoFile(f){ if(!f || f.type.indexOf("image")!==0) return; readImage(f, function(data){ logoDataUrl=data; logoHTML="<img class='akp-logo-img' src='"+data+"'>"; $("akpLogoDrop").classList.add("akp-has"); $("akpLogoHint").innerHTML="<img class='akp-thumb' src='"+data+"'>"; renderRight(); }); }
  function wireDrop(zone, handler){
    ["dragenter","dragover"].forEach(function(ev){ zone.addEventListener(ev, function(e){ e.preventDefault(); e.stopPropagation(); zone.classList.add("akp-drag"); }); });
    ["dragleave","dragend","drop"].forEach(function(ev){ zone.addEventListener(ev, function(e){ e.preventDefault(); e.stopPropagation(); zone.classList.remove("akp-drag"); }); });
    zone.addEventListener("drop", function(e){ var dt=e.dataTransfer; handler(dt&&dt.files&&dt.files.length?dt.files[0]:null); });
  }
  // stop the browser opening an image if it's dropped outside a zone (but keep text-drop working)
  function hasFiles(e){ var t=e.dataTransfer&&e.dataTransfer.types; return t && Array.prototype.indexOf.call(t, "Files")>=0; }
  window.addEventListener("dragover", function(e){ if(hasFiles(e)) e.preventDefault(); });
  window.addEventListener("drop", function(e){ if(hasFiles(e)) e.preventDefault(); });

  $("akpHeroDrop").addEventListener("click", function(){ $("akpHeroFile").click(); });
  $("akpHeroFile").addEventListener("change", function(e){ handleHeroFile(e.target.files[0]); });
  wireDrop($("akpHeroDrop"), handleHeroFile);
  $("akpLogoDrop").addEventListener("click", function(){ $("akpLogoFile").click(); });
  $("akpLogoFile").addEventListener("change", function(e){ handleLogoFile(e.target.files[0]); });
  wireDrop($("akpLogoDrop"), handleLogoFile);

  /* ---- adjust bottle-photo position: pen → drag → lock ---- */
  var PEN_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>';
  var CHECK_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  var editing=false, dragging=false, sX=0, sY=0, sPX=50, sPY=50;
  $("akpPen").innerHTML = PEN_SVG;
  function setEditing(on){
    editing=on;
    $("akpCanvas").classList.toggle("akp-editing", on);
    $("akpPen").classList.toggle("akp-on", on);
    $("akpPen").innerHTML = on ? CHECK_SVG : PEN_SVG;
  }
  $("akpPen").addEventListener("click", function(e){ e.stopPropagation(); setEditing(!editing); });
  (function(){
    var c=$("akpCanvas");
    c.addEventListener("pointerdown", function(e){
      if(!editing || (e.target && e.target.closest && e.target.closest(".akp-pen"))) return;
      dragging=true; sX=e.clientX; sY=e.clientY; sPX=heroPosX; sPY=heroPosY;
      try{ c.setPointerCapture(e.pointerId); }catch(_){}
      e.preventDefault();
    });
    c.addEventListener("pointermove", function(e){
      if(!dragging) return;
      var rect=c.getBoundingClientRect();
      var dxP=((e.clientX-sX)/rect.width)*100, dyP=((e.clientY-sY)/rect.height)*100;
      heroPosX=Math.max(0,Math.min(100, sPX - dxP));
      heroPosY=Math.max(0,Math.min(100, sPY - dyP));
      applyHeroPos();
    });
    function end(e){ if(dragging){ dragging=false; try{ c.releasePointerCapture(e.pointerId);}catch(_){} } }
    c.addEventListener("pointerup", end);
    c.addEventListener("pointercancel", end);
  })();
  function fitPreview(){
    var frame = $("akpFrame"), canvas = $("akpCanvas");
    var isMobile = window.innerWidth < 980;
    var maxW = isMobile ? frame.clientWidth : Math.min(frame.clientWidth, 440);
    var maxH = isMobile ? (window.innerHeight * 0.40) : (window.innerHeight - 190);
    var scale = Math.min(maxW/curW, maxH/curH);
    if(scale <= 0) scale = 0.1;
    canvas.style.width = Math.round(curW*scale)+"px";
    canvas.style.height = Math.round(curH*scale)+"px";
    poster.style.transform = "scale("+scale+")";
  }
  window.addEventListener("resize", fitPreview);
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(fitPreview); }
  function host(){ return $("akpExportHost"); }
  function setStatus(m,k){ var s=$("akpStatus"); s.textContent=m||""; s.className="akp-status"+(k?" "+k:""); }
  function safeName(){ var n=(val("akpName")||"acker-poster").trim(); return n.replace(/[^\w\u4e00-\u9fa5]+/g,"-").replace(/^-+|-+$/g,"").slice(0,60)||"acker-poster"; }
  function renderPoster(){
    return new Promise(function(resolve, reject){
      var ready = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
      ready.then(function(){
        host().innerHTML = "";
        var clone = poster.cloneNode(true);
        clone.style.transform = "none";
        host().appendChild(clone);
        html2canvas(clone, { scale:1, useCORS:true, backgroundColor:"#ffffff", width:curW, height:curH, windowWidth:curW, windowHeight:curH })
          .then(function(c){ host().innerHTML=""; resolve(c.toDataURL("image/png")); })
          .catch(function(err){ host().innerHTML=""; reject(err); });
      });
    });
  }
  $("akpDownload").addEventListener("click", function(){
    setStatus("Rendering…","busy");
    renderPoster().then(function(d){
      var a=document.createElement("a"); a.href=d; a.download=safeName()+"_"+curW+"x"+curH+".png";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setStatus("Downloaded.","ok");
    }).catch(function(e){ setStatus("Render failed: "+e,"err"); });
  });
  function gather(img){
    return {
      vintage:val("akpVintage"), name:val("akpName"), subtitle:val("akpSubtitle"),
      priceLabelCn:val("akpPriceLabelCn"), priceLabelEn:val("akpPriceLabelEn"),
      price: state.variant==="price" ? val("akpPrice") : "",
      badgeCn:val("akpBadgeCn"), badgeEn:val("akpBadgeEn"),
      footerCn:val("akpFooterCn"), footerEn:val("akpFooterEn"),
      variant:state.variant, lang:state.lang, size:curW+"x"+curH, accent:"#801747",
      heroImage:heroDataUrl||"", logoImage:logoDataUrl||"", heroPosX:heroPosX, heroPosY:heroPosY, recordId:currentRecordId||"", posterImage:img||""
    };
  }
  $("akpSave").addEventListener("click", function(){
    if(!CONFIG.ENDPOINT){ setStatus("Backend not configured.","err"); return; }
    setStatus("Rendering & uploading…","busy");
    renderPoster().then(function(img){
      return fetch(CONFIG.ENDPOINT, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(gather(img)), redirect:"follow" });
    }).then(function(r){ return r.json(); })
      .then(function(j){ if(j&&j.status==="success"){ if(j.recordId) currentRecordId=j.recordId; setStatus(j.updated?"Updated this poster.":"Saved as a new poster.","ok"); } else { setStatus("Server error: "+(j&&j.message?j.message:"unknown"),"err"); } })
      .catch(function(e){ setStatus("Save failed: "+e,"err"); });
  });
  $("akpReset").addEventListener("click", function(){ if(confirm("Reset everything?")) location.reload(); });

  /* ---- tabbed panels ---- */
  $("akpTabs").addEventListener("click", function(e){
    var b = e.target.closest("button"); if(!b) return;
    var t = b.getAttribute("data-tab");
    Array.prototype.forEach.call(this.children, function(x){ x.classList.toggle("akp-on", x === b); });
    Array.prototype.forEach.call(document.querySelectorAll(".akp-panel"), function(p){ p.classList.toggle("akp-hide", p.getAttribute("data-panel") !== t); });
    var c = document.querySelector(".akp-controls"); if(c) c.scrollTop = 0;
  });

  /* ---- Saved gallery (load a past poster back into the editor) ---- */
  function jsonp(params){
    return new Promise(function(resolve, reject){
      var cb = "__akp_cb_" + Date.now() + "_" + Math.floor(Math.random()*1e4);
      var s = document.createElement("script");
      var timer = setTimeout(function(){ cleanup(); reject(new Error("timeout")); }, 25000);
      function cleanup(){ try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if(s.parentNode) s.parentNode.removeChild(s); clearTimeout(timer); }
      window[cb] = function(data){ cleanup(); resolve(data); };
      var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+"="+encodeURIComponent(params[k]); }).join("&");
      s.src = CONFIG.ENDPOINT + "?" + qs + "&callback=" + cb;
      s.onerror = function(){ cleanup(); reject(new Error("network")); };
      document.body.appendChild(s);
    });
  }
  function mstatus(t){ $("akpModalStatus").textContent = t || ""; }
  function openLoader(q){
    $("akpModal").classList.remove("akp-hide");
    $("akpModalGrid").innerHTML = "";
    mstatus("Loading…");
    jsonp({ action:"list", q:q||"" }).then(function(res){
      if(res && res.status === "success"){
        if(!res.rows.length){ mstatus(q ? "No matches for “"+q+"”." : "No saved posters yet."); return; }
        mstatus(res.count + (res.count===1?" poster":" posters") + " · tap to load, trash to delete.");
        renderList(res.rows);
      } else { mstatus("Couldn't load: " + (res && res.message ? res.message : "error")); }
    }).catch(function(err){ mstatus("Couldn't load: " + err.message); });
  }
  function closeLoader(){ $("akpModal").classList.add("akp-hide"); }
  var TRASH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
  function renderList(rows){
    var grid = $("akpModalGrid"); grid.innerHTML = "";
    rows.forEach(function(r){
      var card = document.createElement("div"); card.className = "akp-pcard";
      var thumb = r.posterId ? ("https://drive.google.com/thumbnail?id="+r.posterId+"&sz=w400") : "";
      var date = r.ts ? new Date(r.ts).toLocaleDateString() : "";
      var sub  = (r.variant === "noprice") ? "No price" : (r.price || "");
      card.innerHTML =
        '<button class="akp-del" type="button" title="Delete">'+TRASH+'</button>'+
        '<img loading="lazy" src="'+thumb+'" onerror="this.style.opacity=0.2">'+
        '<div class="akp-pcard-meta"><div class="akp-pcard-name">'+esc(r.name||"(untitled)")+'</div>'+
        '<div class="akp-pcard-sub">'+esc(sub)+(sub&&date?" · ":"")+date+'</div></div>';
      card.querySelector(".akp-del").addEventListener("click", function(ev){ ev.stopPropagation(); deletePoster(r.recordId, card); });
      card.addEventListener("click", function(){ loadById(r.recordId); });
      grid.appendChild(card);
    });
  }
  function deletePoster(id, card){
    if(!id) return;
    if(!confirm("Delete this poster?")) return;
    if(!confirm("This permanently removes the poster and its image from Drive. Delete for good?")) return;
    mstatus("Deleting…");
    jsonp({ action:"delete", id:id }).then(function(res){
      if(res && res.status === "success"){
        if(card && card.parentNode) card.parentNode.removeChild(card);
        if(currentRecordId === id) currentRecordId = "";
        mstatus("Deleted.");
      } else { mstatus("Couldn't delete: " + (res && res.message ? res.message : "error")); }
    }).catch(function(err){ mstatus("Couldn't delete: " + err.message); });
  }
  function loadById(id){
    if(!id || !/^[A-Za-z0-9_-]{20,}$/.test(String(id))){ mstatus("This poster was saved before reload support, so it can't be opened. New saves reload fully."); return; }
    mstatus("Loading…");
    jsonp({ action:"get", id:id }).then(function(res){
      if(res && res.status === "success" && res.record){ loadRecord(res.record); currentRecordId = id; closeLoader(); }
      else { mstatus("Couldn't open: " + (res && res.message ? res.message : "error")); }
    }).catch(function(err){ mstatus("Couldn't open: " + err.message); });
  }
  function sizeKeyFromDims(dims){ for(var k in SIZES){ if(SIZES[k].w+"x"+SIZES[k].h === dims) return k; } return "default"; }
  function loadRecord(r){
    $("akpVintage").value      = r.vintage||"";
    $("akpName").value         = r.name||"";
    $("akpSubtitle").value     = r.subtitle||"";
    $("akpPrice").value        = r.price||"";
    $("akpPriceLabelCn").value = r.priceLabelCn||"";
    $("akpPriceLabelEn").value = r.priceLabelEn||"";
    $("akpBadgeCn").value      = r.badgeCn||"";
    $("akpBadgeEn").value      = r.badgeEn||"";
    $("akpFooterCn").value     = r.footerCn||"";
    $("akpFooterEn").value     = r.footerEn||"";
    if(r.heroImage){ showHero(r.heroImage); }
    heroPosX = (r.heroPosX==null?50:Number(r.heroPosX)); heroPosY = (r.heroPosY==null?50:Number(r.heroPosY)); applyHeroPos();
    if(r.logoImage){ logoDataUrl=r.logoImage; logoHTML="<img class='akp-logo-img' src='"+r.logoImage+"'>"; $("akpLogoDrop").classList.add("akp-has"); $("akpLogoHint").innerHTML="<img class='akp-thumb' src='"+r.logoImage+"'>"; }
    else { logoDataUrl=""; logoHTML=LOGO_DEFAULT; }
    var szKey = sizeKeyFromDims(r.size||"1242x1660"); $("akpSize").value = szKey; applySize(szKey);
    setVintage(val("akpVintage")); setIf("pName", val("akpName")); setSubtitle(val("akpSubtitle"));
    applyVariant(r.variant||"price");
    applyLang(r.lang||"sc", true);
    refreshFooter();
  }
  $("akpLoad").addEventListener("click", function(){ $("akpSearch").value=""; openLoader(""); });
  $("akpModalClose").addEventListener("click", closeLoader);
  $("akpModal").addEventListener("click", function(e){ if(e.target === this) closeLoader(); });
  var searchTimer;
  $("akpSearch").addEventListener("input", function(){ var q=this.value; clearTimeout(searchTimer); searchTimer=setTimeout(function(){ openLoader(q); }, 320); });
  $("akpBackendNote").textContent = "Cloud save is connected to your Apps Script.";
  setVintage(val("akpVintage"));
  setIf("pName", val("akpName"));
  setSubtitle(val("akpSubtitle"));
  refreshFooter();
  applyVariant("price");
  applyLang("sc");
  applySize("default");
})();
</script>
</body>
</html>
