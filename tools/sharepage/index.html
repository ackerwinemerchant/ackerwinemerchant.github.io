<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acker — Cellar Studio</title>
<style>
/* ===================== STUDIO CHROME (scoped .ackstudio) ===================== */
.ackstudio{
  --ack-burgundy:#801747; --ack-burgundy-dk:#6A133B; --ack-burgundy-dpr:#550F2F; --ack-burgundy-wash:#F6EAF0;
  --ack-gold:#BEAD85; --ack-gold-dk:#A18A56; --ack-gold-wash:#F3EFE4;
  --ack-black:#212121; --ack-grey:#F2F2F2;
  --ack-ink:#212121; --ack-ink-deep:#141414; --ack-text:#3A3A3A; --ack-text-2:#5A5A5A;
  --ack-muted:#8A8A8A; --ack-faint:#BCBCBC; --ack-on-dark:#F2F2F2; --ack-on-dark-2:#CBCBCB;
  --ack-line:#E2E2E2; --ack-line-gold:rgba(190,173,133,.55); --ack-line-dark:rgba(255,255,255,.16);
  --ack-bg:#FFFFFF; --ack-fill:#F2F2F2; --ack-paper:#FFFFFF; --ack-char:#212121;
  --ack-radius:4px; --ack-radius-img:2px;
  --ack-font:'Avenir Next','Avenir','Nunito Sans','Helvetica Neue','Segoe UI','Roboto';
  --ack-cjk-sc:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC','Source Han Sans SC';
  --ack-cjk-tc:'PingFang TC','Hiragino Sans CNS','Microsoft JhengHei','Noto Sans TC','Source Han Sans TC';
  font-family:var(--ack-font),var(--ack-cjk-sc),sans-serif; color:var(--ack-ink); line-height:1.6;
  -webkit-font-smoothing:antialiased; background:var(--ack-grey);
}
.ackstudio [lang="zh-Hant"],.ackstudio[lang="zh-Hant"]{font-family:var(--ack-font),var(--ack-cjk-tc),sans-serif;}
.ackstudio [lang="zh-Hans"],.ackstudio[lang="zh-Hans"]{font-family:var(--ack-font),var(--ack-cjk-sc),sans-serif;}
*{margin:0;padding:0;}
.ackstudio,.ackstudio *,.ackstudio *::before,.ackstudio *::after{box-sizing:border-box;}
.ackstudio{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}

/* topbar */
.ackstudio .topbar{display:flex;align-items:center;gap:18px;padding:0 20px;height:62px;
  background:var(--ack-char);color:var(--ack-on-dark);flex:0 0 auto;border-bottom:1px solid var(--ack-line-dark);}
.ackstudio .brandmark{height:30px;display:flex;align-items:center;}
.ackstudio .brandmark svg{height:30px;width:auto;display:block;}
.ackstudio .tb-titles{display:flex;flex-direction:column;line-height:1.15;margin-right:auto;}
.ackstudio .tb-kicker{font-size:.62rem;text-transform:uppercase;letter-spacing:.24em;color:var(--ack-gold);}
.ackstudio .tb-sub{font-size:.74rem;color:var(--ack-on-dark-2);letter-spacing:.02em;}
.ackstudio .typeswitch,.ackstudio .langswitch{display:flex;gap:2px;background:rgba(255,255,255,.07);
  border:1px solid var(--ack-line-dark);border-radius:var(--ack-radius);padding:3px;}
.ackstudio .typeswitch button,.ackstudio .langswitch button{appearance:none;border:0;background:transparent;
  color:var(--ack-on-dark-2);font:inherit;font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;
  padding:6px 12px;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ackstudio .langswitch button{letter-spacing:.06em;padding:6px 10px;}
.ackstudio .typeswitch button.on,.ackstudio .langswitch button.on{background:var(--ack-burgundy);color:#fff;}
.ackstudio .typeswitch button:hover:not(.on),.ackstudio .langswitch button:hover:not(.on){color:#fff;}

/* layout */
.ackstudio .stage{flex:1 1 auto;display:flex;min-height:0;}
.ackstudio .panel{display:flex;flex-direction:column;min-height:0;}
.ackstudio .form{flex:0 0 41%;max-width:560px;background:var(--ack-bg);border-right:1px solid var(--ack-line);overflow-y:auto;}
.ackstudio .preview{flex:1 1 auto;background:var(--ack-grey);}

/* accordions */
.ackstudio .acc{border-bottom:1px solid var(--ack-line);}
.ackstudio .acc>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:10px;
  padding:14px 20px;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ack-ink);
  font-weight:600;user-select:none;}
.ackstudio .acc>summary::-webkit-details-marker{display:none;}
.ackstudio .acc>summary .chev{margin-left:auto;width:14px;height:14px;color:var(--ack-muted);transition:transform .18s;}
.ackstudio .acc[open]>summary .chev{transform:rotate(90deg);}
.ackstudio .acc>summary .sec-ico{width:16px;height:16px;color:var(--ack-burgundy);flex:0 0 auto;}
.ackstudio .acc-body{padding:4px 20px 20px;}
.ackstudio .switch{margin-left:8px;position:relative;width:38px;height:21px;border-radius:999px;
  background:var(--ack-line);border:1px solid var(--ack-line);cursor:pointer;flex:0 0 auto;transition:background .16s;}
.ackstudio .switch::after{content:"";position:absolute;top:1px;left:1px;width:17px;height:17px;border-radius:50%;
  background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:left .16s;}
.ackstudio .switch.on{background:var(--ack-burgundy);border-color:var(--ack-burgundy);}
.ackstudio .switch.on::after{left:18px;}

/* fields */
.ackstudio .fld{margin-bottom:13px;}
.ackstudio .fld:last-child{margin-bottom:0;}
.ackstudio .fld label{display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ack-text-2);margin-bottom:5px;}
.ackstudio .row2{display:flex;gap:11px;}
.ackstudio .row2>.fld{flex:1;}
.ackstudio input[type=text],.ackstudio input[type=url],.ackstudio textarea,.ackstudio select{
  width:100%;font:inherit;font-size:.86rem;color:var(--ack-ink);background:var(--ack-bg);
  border:1px solid var(--ack-line);border-radius:var(--ack-radius);padding:9px 11px;transition:border-color .15s;}
.ackstudio textarea{min-height:74px;resize:vertical;line-height:1.55;}
.ackstudio input:focus,.ackstudio textarea:focus,.ackstudio select:focus{outline:none;border-color:var(--ack-burgundy);}
.ackstudio input::placeholder,.ackstudio textarea::placeholder{color:var(--ack-faint);}
.ackstudio .hint{font-size:.7rem;color:var(--ack-muted);margin-top:5px;letter-spacing:.01em;}
.ackstudio .langbadge{display:inline-block;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ack-burgundy);background:var(--ack-burgundy-wash);border-radius:3px;padding:1px 6px;margin-left:7px;vertical-align:1px;}

/* image field */
.ackstudio .imgfield{display:flex;gap:9px;align-items:flex-start;}
.ackstudio .imgfield input{flex:1;}
.ackstudio .btn-up{flex:0 0 auto;white-space:nowrap;}
.ackstudio .thumb{margin-top:8px;width:100%;max-height:120px;object-fit:cover;border:1px solid var(--ack-line);
  border-radius:var(--ack-radius-img);display:none;}

/* buttons */
.ackstudio .btn{appearance:none;border:0;background:var(--ack-burgundy);color:#fff;font:inherit;font-size:.78rem;
  letter-spacing:.06em;padding:9px 15px;border-radius:var(--ack-radius);cursor:pointer;display:inline-flex;
  align-items:center;gap:7px;transition:background .15s;}
.ackstudio .btn:hover{background:var(--ack-burgundy-dk);}
.ackstudio .btn:active{background:var(--ack-burgundy-dpr);}
.ackstudio .btn svg{width:15px;height:15px;}
.ackstudio .btn-ghost{background:transparent;color:var(--ack-burgundy);border:1px solid var(--ack-burgundy);}
.ackstudio .btn-ghost:hover{background:var(--ack-burgundy-wash);}
.ackstudio .btn-soft{background:var(--ack-fill);color:var(--ack-ink);border:1px solid var(--ack-line);}
.ackstudio .btn-soft:hover{background:var(--ack-grey);border-color:var(--ack-faint);}

/* repeatable rows */
.ackstudio .rows{display:flex;flex-direction:column;gap:11px;}
.ackstudio .rowcard{border:1px solid var(--ack-line);border-radius:var(--ack-radius);padding:12px;background:var(--ack-bg);position:relative;}
.ackstudio .rowcard .rownum{position:absolute;top:-9px;left:11px;background:var(--ack-bg);font-size:.62rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--ack-muted);padding:0 6px;}
.ackstudio .rowcard .rm{position:absolute;top:9px;right:9px;width:24px;height:24px;border:0;background:transparent;
  color:var(--ack-faint);cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.ackstudio .rowcard .rm:hover{color:var(--ack-burgundy);background:var(--ack-burgundy-wash);}
.ackstudio .rowcard .rm svg{width:15px;height:15px;}
.ackstudio .iconpick{display:flex;flex-wrap:wrap;gap:5px;}
.ackstudio .iconpick button{width:30px;height:30px;border:1px solid var(--ack-line);background:var(--ack-bg);
  border-radius:var(--ack-radius);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ack-text-2);}
.ackstudio .iconpick button svg{width:16px;height:16px;}
.ackstudio .iconpick button.on{border-color:var(--ack-burgundy);color:var(--ack-burgundy);background:var(--ack-burgundy-wash);}
.ackstudio .langpick{display:flex;gap:6px;}
.ackstudio .langpick button{flex:1;appearance:none;border:1px solid var(--ack-line);background:var(--ack-bg);
  color:var(--ack-text-2);font:inherit;font-size:.8rem;letter-spacing:.04em;padding:8px 6px;border-radius:var(--ack-radius);cursor:pointer;transition:all .14s;}
.ackstudio .langpick button.on{border-color:var(--ack-burgundy);color:#fff;background:var(--ack-burgundy);}
.ackstudio .langpick button:hover:not(.on){border-color:var(--ack-faint);}
.ackstudio .addrow{margin-top:11px;}

/* preview pane */
.ackstudio .pvbar{flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:11px 16px;background:var(--ack-bg);
  border-bottom:1px solid var(--ack-line);flex-wrap:wrap;}
.ackstudio .devtabs{display:flex;gap:2px;background:var(--ack-fill);border-radius:var(--ack-radius);padding:3px;margin-left:auto;}
.ackstudio .devtabs button{border:0;background:transparent;font:inherit;font-size:.72rem;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ack-text-2);padding:5px 12px;border-radius:3px;cursor:pointer;}
.ackstudio .devtabs button.on{background:#fff;color:var(--ack-ink);box-shadow:0 1px 2px rgba(0,0,0,.08);}
.ackstudio .pvwrap{flex:1 1 auto;overflow:auto;display:flex;justify-content:center;padding:22px;min-height:0;}
.ackstudio .frame-shell{background:#fff;border-radius:6px;box-shadow:0 8px 34px rgba(33,33,33,.16);overflow:hidden;
  width:100%;max-width:1180px;transition:max-width .2s;align-self:flex-start;}
.ackstudio .frame-shell.mobile{max-width:392px;border-radius:22px;box-shadow:0 10px 40px rgba(33,33,33,.22);}
.ackstudio iframe{width:100%;height:74vh;border:0;display:block;background:#fff;}
.ackstudio .frame-shell.mobile iframe{height:720px;}

.ackstudio .sharecard{margin:0 16px 16px;background:var(--ack-gold-wash);border:1px solid var(--ack-line-gold);
  border-radius:var(--ack-radius);padding:12px 15px;font-size:.76rem;color:var(--ack-text);line-height:1.55;}
.ackstudio .sharecard b{color:var(--ack-ink);}
.ackstudio .statusline{font-size:.72rem;color:var(--ack-muted);margin-left:4px;}

.ackstudio .se700{display:none;}
@media(max-width:880px){
  .ackstudio .stage{flex-direction:column;}
  .ackstudio .form{flex:1 1 auto;max-width:none;border-right:0;border-bottom:1px solid var(--ack-line);}
  .ackstudio .tb-sub,.ackstudio .tb-kicker{display:none;}
  .ackstudio .topbar{gap:10px;height:auto;padding:9px 12px;flex-wrap:wrap;}
}
</style>
</head>
<body>
<div class="ackstudio" id="app">

  <!-- ===================== TOPBAR ===================== -->
  <div class="topbar">
    <span class="brandmark" id="tbLogo"></span>
    <div class="tb-titles">
      <span class="tb-kicker">Cellar Studio</span>
      <span class="tb-sub">Build &amp; share branded auction, tasting &amp; release pages</span>
    </div>
    <div class="typeswitch" id="typeSwitch">
      <button data-type="auction" class="on">Auction</button>
      <button data-type="tasting">Tasting</button>
      <button data-type="offer">Release</button>
      <button data-type="lot">Lot</button>
    </div>
    <div class="langswitch" id="langSwitch" title="Which language you are editing">
      <button data-lang="en" class="on">EN</button>
      <button data-lang="tc">繁</button>
      <button data-lang="sc">简</button>
    </div>
  </div>

  <div class="stage">
    <!-- ===================== FORM ===================== -->
    <div class="panel form" id="form"></div>

    <!-- ===================== PREVIEW ===================== -->
    <div class="panel preview">
      <div class="pvbar">
        <button class="btn" id="btnDownload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>
          Download page
        </button>
        <button class="btn btn-ghost" id="btnCopy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
          Copy HTML
        </button>
        <button class="btn btn-soft" id="btnClear">Clear fields</button>
        <span class="statusline" id="status"></span>
        <div class="devtabs" id="devTabs">
          <button data-dev="desktop" class="on">Desktop</button>
          <button data-dev="mobile">Mobile</button>
        </div>
      </div>
      <div class="pvwrap">
        <div class="frame-shell" id="frameShell">
          <iframe id="frame" title="Live preview"></iframe>
        </div>
      </div>
      <div class="sharecard">
        <b>Sending the file</b> (WhatsApp / email): hit <b>Download page</b> — every image is baked into the file, so it renders offline and on any phone. The page carries its own <b>EN / 繁 / 简</b> switcher.
      </div>
    </div>
  </div>
</div>

.ackpage footer{background:var(--ink-deep);color:var(--on-dark);text-align:center;}
.ackpage footer .foot-inner{max-width:680px;margin:0 auto;padding:50px 34px 42px;}
.ackpage footer .flogo{height:38px;margin:0 auto 18px;}
.ackpage footer .flogo svg{height:38px;width:auto;margin:0 auto;display:block;}
.ackpage footer .tagline{font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);}
.ackpage footer .frule{width:42px;height:1px;background:var(--line-gold);margin:24px auto;}
.ackpage footer .follow-eyebrow,.ackpage footer .app-eyebrow{font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--on-dark2);margin-bottom:16px;}
.ackpage footer .socialwrap{display:flex;flex-direction:column;align-items:center;}
.ackpage footer .social-groups{display:flex;justify-content:center;flex-wrap:wrap;gap:22px 56px;}
.ackpage footer .sgroup{text-align:center;}
.ackpage footer .sgroup-h{font-size:.56rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:15px;}
.ackpage footer .sgroup-row{display:flex;align-items:center;justify-content:center;gap:24px;}
.ackpage footer .smark{display:inline-flex;align-items:center;color:var(--on-dark);transition:color .15s;}
.ackpage footer .smark:hover{color:var(--gold);}
.ackpage footer .smark svg{display:block;}
.ackpage footer .smark-instagram svg{width:24px;height:24px;}
.ackpage footer .smark-rednote svg{height:15px;width:auto;}
.ackpage footer .news-btn{display:inline-block;margin-top:30px;color:var(--gold);text-decoration:none;
  border:1px solid var(--line-gold);border-radius:4px;padding:.7em 1.8em;font-size:.78rem;letter-spacing:.14em;
  text-transform:uppercase;transition:background .15s,color .15s,border-color .15s;}
.ackpage footer .news-btn:hover{background:var(--gold);color:var(--ink);border-color:var(--gold);}
.ackpage footer .appwrap{margin-top:34px;}
.ackpage footer .appbadges{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;}
.ackpage footer .appbadges a{display:inline-flex;line-height:0;transition:opacity .15s;}
.ackpage footer .appbadges a:hover{opacity:.82;}
.ackpage footer .appbadges svg{display:block;height:40px;width:auto;}
.ackpage footer .contact{font-size:.82rem;color:var(--on-dark2);line-height:1.7;}
.ackpage footer .contact a{color:var(--on-dark2);text-decoration:none;}
.ackpage footer .copy{font-size:.7rem;color:var(--muted);margin-top:16px;letter-spacing:.04em;}
@media(max-width:520px){
  .ackpage .wine{flex-wrap:wrap;}
  .ackpage .wine .wp{width:100%;text-align:left;padding-left:0;}
  .ackpage .chip{flex:1 1 100%;border-left:0!important;border-top:1px solid var(--line-gold);}
  .ackpage .chip:first-child{border-top:0;}
}

function buildPage(S){
  var reg = {en:{}, tc:{}, sc:{}};
  var kc = 0;
  /* register a translatable string under a fresh key; returns {key, html(EN initial)} */
  function T(txObj, multiline){
    var key = 'k'+(kc++);
    ['en','tc','sc'].forEach(function(l){
      var v = resolve(txObj, l);
      reg[l][key] = multiline ? nl2br(esc(v)) : esc(v);
    });
    return { key:key, html:reg.en[key] };
  }
  function span(txObj, cls, multiline){
    var t = T(txObj, multiline);
    return '<span class="'+(cls||'')+'" data-i18n="'+t.key+'">'+reg[defLang][t.key]+'</span>';
  }
  function has(txObj){ return !!(resolve(txObj,'en') || resolve(txObj,'tc') || resolve(txObj,'sc')); }

  /* If the CTA "link" is actually an email address, turn it into a mailto: with an
     auto subject drawn from the page headline. Otherwise treat it as a normal URL. */
  function emailish(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(String(v||'').trim()); }
  function ctaAttrs(){
    var raw = String(S.ctaUrl||'').trim();
    if(emailish(raw)){
      var base = resolve(S.tx.badge, defLang) || resolve(S.tx.hlBold, defLang)
               || resolve(S.tx.badge,'en')   || resolve(S.tx.hlBold,'en') || 'Enquiry';
      var dt   = resolve(S.tx.date, defLang) || resolve(S.tx.date,'en') || '';
      var subj = dt ? (base + ' \u2014 ' + dt) : base;     /* em-dash between title & date */
      return ' href="'+escAttr('mailto:'+raw+'?subject='+encodeURIComponent(subj))+'"';
    }
    return ' href="'+escAttr(raw)+'" target="_blank" rel="noopener"';
  }

  /* which languages this page exposes; first is the default shown */
  var LANGCODE = {en:'en', tc:'zh-Hant', sc:'zh-Hans'};
  var LANGBTN  = {en:'EN', tc:'繁', sc:'简'};
  var ALL3 = ['en','tc','sc'];
  var langs = (S.langs && S.langs.length)
    ? S.langs.filter(function(l,i){ return ALL3.indexOf(l)>-1 && S.langs.indexOf(l)===i; })
    : ALL3.slice();
  if(!langs.length) langs = ['en'];
  var defLang = langs[0];

  var hs = S.heroStyle || 'dark';
  var heroLogo = (hs==='light') ? LOGO_BLACK : LOGO_WHITE;   /* black on light, white on dark/wine */

  /* ---- title (for <title> + document.title switch) ---- */
  ['en','tc','sc'].forEach(function(l){
    var b = resolve(S.tx.hlBold,l), bd = resolve(S.tx.badge,l);
    reg[l]['__title'] = esc((b? b : (bd||'Acker')) + ' — Acker');
  });

  var out = [];
  out.push('<!DOCTYPE html>');
  out.push('<html lang="'+LANGCODE[defLang]+'">');
  out.push('<head>');
  out.push('<meta charset="UTF-8">');
  out.push('<meta name="viewport" content="width=device-width, initial-scale=1.0">');
  out.push('<title>'+reg[defLang]['__title']+'</title>');
  out.push('<meta name="description" content="'+escAttr(resolve(S.tx.subhead,'en'))+'">');
  out.push('<meta property="og:type" content="website">');
  out.push('<meta property="og:site_name" content="Acker Merrall & Condit">');
  out.push('<meta property="og:title" content="'+escAttr(resolve(S.tx.hlBold,'en'))+'">');
  out.push('<meta property="og:description" content="'+escAttr(resolve(S.tx.subhead,'en'))+'">');
  if(S.heroImg){
    out.push('<meta property="og:image" content="'+escAttr(S.heroImg)+'">');
    out.push('<meta property="og:image:width" content="1200">');
    out.push('<meta property="og:image:height" content="630">');
  }
  if(S.ctaUrl && !emailish(S.ctaUrl)) out.push('<meta property="og:url" content="'+escAttr(S.ctaUrl)+'">');
  out.push('<meta name="twitter:card" content="summary_large_image">');
  out.push('<style>'+PAGE_CSS+'</style>');
  out.push('</head>');
  out.push('<body>');
  out.push('<div class="ackpage" id="ackpage">');

  /* language bar — only the selected languages; hidden entirely if just one */
  if(langs.length > 1){
    out.push('<div class="langbar">' + langs.map(function(l){
      return '<button data-lang="'+l+'"'+(l===defLang?' class="on"':'')+' onclick="ackSet(\''+l+'\')">'+LANGBTN[l]+'</button>';
    }).join('') + '</div>');
  }

  /* ---------- KEY DETAILS (chips) — built first, rendered inside the hero ---------- */
  var chips = [];
  if(has(S.tx.date))  chips.push(['DATE', S.tx.date]);
  if(has(S.tx.time))  chips.push(['TIME', S.tx.time]);
  if(has(S.tx.venue)) chips.push(['VENUE', S.tx.venue]);
  var chipsHtml = '';
  if(chips.length){
    chipsHtml = '<div class="chips">';
    chips.forEach(function(c){
      chipsHtml += '<div class="chip"><span class="k">'+esc(c[0])+'</span><span class="v">'+span(c[1])+'</span></div>';
    });
    chipsHtml += '</div>';
  }

  /* ---------- HERO (full-bleed band; inner content centred to the page column) ---------- */
  out.push('<div class="hero '+esc(hs)+'">');
  out.push('<div class="hero-inner">');
  out.push('<div class="logo">'+heroLogo+'</div>');
  if(has(S.tx.badge)) out.push('<div class="badge eyebrow">'+span(S.tx.badge)+'</div>');
  /* headline — skip empty */
  if(has(S.tx.hlLight) || has(S.tx.hlBold)){
    out.push('<h1 class="disp">');
    if(has(S.tx.hlLight)) out.push(span(S.tx.hlLight,'light'));
    if(has(S.tx.hlBold))  out.push(span(S.tx.hlBold,'bold'));
    out.push('</h1>');
  }
  if(has(S.tx.subhead)) out.push('<p class="sub">'+span(S.tx.subhead,'',true)+'</p>');
  /* co-brand */
  if(S.on.partner && (S.partnerLogo || has(S.tx.partnerName))){
    out.push('<div class="cobrand"><span>'+esc(BRAND.name)+'</span><span>×</span>');
    if(S.partnerLogo) out.push('<img src="'+escAttr(S.partnerLogo)+'" alt="partner">');
    else out.push(span(S.tx.partnerName));
    out.push('</div>');
  }
  if(chipsHtml) out.push(chipsHtml);
  /* primary CTA */
  if(S.ctaUrl && has(S.tx.ctaLabel)){
    out.push('<a class="cta"'+ctaAttrs()+'>'+span(S.tx.ctaLabel)+'</a>');
  }
  if(S.heroImg) out.push('<div class="hero-photo'+(S.type==='offer'?' lg':'')+'"><img src="'+escAttr(S.heroImg)+'" alt=""></div>');
  out.push('</div>');/* /hero-inner */
  out.push('</div>');/* /hero */

  out.push('<div class="wrap">');


  function secHead(eyebrowTx, titleTx){
    var h = '<div class="sec-head">';
    if(eyebrowTx) h += '<p class="eyebrow">'+esc(eyebrowTx)+'</p>';
    h += '<h2>'+span(titleTx)+'</h2><div class="ul"></div></div>';
    return h;
  }

  /* ---------- WINES / LOTS ---------- */
  if(S.on.wines && S.wines && S.wines.length){
    if((S.wineStyle||'cards')==='menu'){
      /* invitation-style menu: grouped by producer, gold frame on a dark band */
      out.push('<section class="winemenu-sec"><div class="winemenu">');
      out.push('<div class="wm-head"><span class="wm-rule"></span>'+span(S.tx.winesTitle,'wm-title')+'<span class="wm-rule"></span></div>');
      var lastG = '\u0000';
      S.wines.forEach(function(w){
        var g = w.group ? resolve(w.group,'en') : '';
        if(g !== lastG){
          if(lastG !== '\u0000') out.push('</div>');
          out.push('<div class="wm-group">');
          if(has(w.group)) out.push('<h3 class="wm-producer">'+span(w.group)+'</h3>');
          lastG = g;
        }
        out.push('<div class="wm-wine">'+span(w.name));
        if(has(w.detail)) out.push('<span class="wm-detail">'+span(w.detail)+'</span>');
        out.push('</div>');
      });
      if(lastG !== '\u0000') out.push('</div>');
      out.push('</div></section>');
    } else {
      out.push('<section>'+secHead('Fine & Rare', S.tx.winesTitle)+'<div class="wines">');
      S.wines.forEach(function(w){
        out.push('<div class="wine">');
        if(w.img) out.push('<img class="ph" src="'+escAttr(w.img)+'" alt="">');
        out.push('<div class="body">');
        out.push('<div class="wn">'+span(w.name)+'</div>');
        if(has(w.detail)) out.push('<div class="wd">'+span(w.detail)+'</div>');
        if(has(w.note))   out.push('<div class="wnote">'+span(w.note)+'</div>');
        out.push('<a class="enq" href="mailto:'+escAttr(BRAND.enquiryEmail)+'?subject='+encodeURIComponent('Enquiry: '+resolve(w.name,'en'))+'">Enquire</a>');
        out.push('</div>');
        if(w.price) out.push('<div class="wp">'+esc(w.price)+'</div>');
        out.push('</div>');
      });
      out.push('</div></section>');
    }
  }

  /* ---------- HIGHLIGHTS ---------- */
  if(S.on.highlights && S.highlights && S.highlights.length){
    out.push('<section>'+secHead('', S.tx.highlightsTitle)+'<div class="hl-grid">');
    S.highlights.forEach(function(h){
      out.push('<div class="hl"><div class="ico">'+(ICONS[h.icon]||ICONS.star)+'</div>'
        +'<h3>'+span(h.title)+'</h3><p>'+span(h.text)+'</p></div>');
    });
    out.push('</div></section>');
  }

  /* ---------- AGENDA ---------- */
  if(S.on.agenda && S.agenda && S.agenda.length){
    out.push('<section>'+secHead('', S.tx.agendaTitle)+'<div class="agenda">');
    S.agenda.forEach(function(a){
      out.push('<div class="ag"><div class="t">'+span(a.time)+'</div><div class="a">'+span(a.activity)+'</div></div>');
    });
    out.push('</div></section>');
  }

  /* ---------- HOSTS ---------- */
  if(S.on.hosts && S.hosts && S.hosts.length){
    out.push('<section>'+secHead('', S.tx.hostsTitle)+'<div class="hosts">');
    S.hosts.forEach(function(p){
      out.push('<div class="host">');
      out.push(p.photo ? '<img src="'+escAttr(p.photo)+'" alt="">' : '<div class="ph"></div>');
      out.push('<div class="hn">'+span(p.name)+'</div><div class="ht">'+span(p.title)+'</div></div>');
    });
    out.push('</div></section>');
  }

  /* ---------- ABOUT ---------- */
  if(S.on.about && (has(S.tx.aboutTitle) || has(S.tx.aboutBody))){
    out.push('<section>'+secHead('', S.tx.aboutTitle)+'<p class="about">'+span(S.tx.aboutBody,'',true)+'</p></section>');
  }

  /* ---------- OFFER ---------- */
  if(S.on.offer && (has(S.tx.offerTitle) || has(S.tx.offerBody) || S.offerCode)){
    out.push('<section><div class="offer">');
    if(has(S.tx.offerTitle)) out.push('<h3>'+span(S.tx.offerTitle)+'</h3>');
    if(has(S.tx.offerBody))  out.push('<p>'+span(S.tx.offerBody,'',true)+'</p>');
    if(S.offerCode)          out.push('<div class="code">'+esc(S.offerCode)+'</div>');
    if(has(S.tx.offerValid)) out.push('<div class="valid">'+span(S.tx.offerValid)+'</div>');
    if(has(S.tx.offerTerms)) out.push('<div class="terms">'+span(S.tx.offerTerms,'',true)+'</div>');
    out.push('</div></section>');
  }

  /* ---------- FINAL CTA ---------- */
  if(S.on.finalCta && has(S.tx.finalLine)){
    out.push('<section class="final"><div class="fl">'+span(S.tx.finalLine)+'</div>');
    if(S.ctaUrl && has(S.tx.ctaLabel)){
      out.push('<a class="cta"'+ctaAttrs()+'>'+span(S.tx.ctaLabel)+'</a>');
    }
    out.push('</section>');
  }

  out.push('</div>');/* /wrap */

  /* ---------- FOOTER ---------- */
  out.push('<footer><div class="foot-inner">');
  out.push('<div class="flogo">'+LOGO_WHITE+'</div>');
  out.push('<div class="tagline">'+BRAND.tagline+'</div>');
  out.push('<div class="frule"></div>');

  /* social — Instagram + RedNote, grouped by Auctions / Merchant */
  out.push('<div class="follow-eyebrow">Follow Acker</div>');
  out.push('<div class="socialwrap"><div class="social-groups">');
  if(BRAND.social.groups && BRAND.social.groups.length){
    BRAND.social.groups.forEach(function(g){
      out.push('<div class="sgroup"><div class="sgroup-h">'+span(g.div)+'</div><div class="sgroup-row">');
      g.items.forEach(function(it){
        if(!it.u) return;
        out.push('<a class="smark smark-'+esc(it.icon)+'" href="'+escAttr(it.u)+'" target="_blank" rel="noopener" aria-label="'+escAttr(it.cap)+'">'
          +(SOCIAL[it.icon]||'')+'</a>');
      });
      out.push('</div></div>');
    });
  }
  out.push('</div></div>');

  /* newsletter */
  if(BRAND.newsletter){
    out.push('<a class="news-btn" href="'+escAttr(BRAND.newsletter)+'" target="_blank" rel="noopener">'
      +span({en:'Subscribe to Our Newsletter',tc:'訂閱電子報',sc:'订阅电子报'})+'</a>');
  }

  /* app badges */
  if(S.on.app !== false){
    var ab = appBadges();
    if(ab) out.push(ab);
  }

  out.push('<div class="frule"></div>');
  out.push('<div class="contact">'+span(S.tx.ftAddr)+'</div>');
  out.push('<div class="copy">© '+(new Date().getFullYear())+' Acker Merrall &amp; Condit · '+esc(BRAND.estLine)+'</div>');
  out.push('</div></footer>');

  out.push('</div>');/* /ackpage */

  /* ---------- i18n switcher script (only when >1 language; no backticks / no ${}) ---------- */
  if(langs.length > 1){
    var regOut = {};
    langs.forEach(function(l){ regOut[l] = reg[l]; });
    out.push('<script>');
    out.push('var ACK_I18N='+JSON.stringify(regOut)+';var ACK_DEF="'+defLang+'";');
    out.push('function ackSet(l){var d=ACK_I18N[l]||ACK_I18N[ACK_DEF];'
      +'var ns=document.querySelectorAll("#ackpage [data-i18n]");'
      +'for(var i=0;i<ns.length;i++){var k=ns[i].getAttribute("data-i18n");if(d[k]!=null)ns[i].innerHTML=d[k];}'
      +'if(d.__title)document.title=d.__title;'
      +'var bs=document.querySelectorAll(".langbar button");'
      +'for(var j=0;j<bs.length;j++){bs[j].classList.toggle("on",bs[j].getAttribute("data-lang")===l);}'
      +'document.documentElement.lang=(l==="en"?"en":(l==="tc"?"zh-Hant":"zh-Hans"));}');
    out.push('<\/script>');
  }

  out.push('</body></html>');
  return out.join('');
}

/* ============================================================================
   FORM — static accordions bound to state; repeatable rows rendered dynamically
============================================================================ */
function field(label, key, kind, ph){
  /* kind: tx | v ; translatable fields carry data-tx, plain carry data-v */
  var attr = (kind==='tx') ? 'data-tx="'+key+'"' : 'data-v="'+key+'"';
  var input = (kind==='tx')
    ? '<input type="text" '+attr+' placeholder="'+escAttr(ph||'')+'">'
    : '<input type="text" '+attr+' placeholder="'+escAttr(ph||'')+'">';
  var badge = (kind==='tx') ? '<span class="langbadge" data-langbadge>EN</span>' : '';
  return '<div class="fld"><label>'+esc(label)+badge+'</label>'+input+'</div>';
}
function area(label, key, ph){
  return '<div class="fld"><label>'+esc(label)+'<span class="langbadge" data-langbadge>EN</span></label>'
    +'<textarea data-tx="'+key+'" placeholder="'+escAttr(ph||'')+'"></textarea></div>';
}
function imgField(label, key){
  return '<div class="fld"><label>'+esc(label)+'</label><div class="imgfield">'
    +'<input type="url" data-v="'+key+'" placeholder="Paste an image URL, or use Upload">'
    +'<button class="btn btn-soft btn-up" data-up="'+key+'">Upload</button></div>'
    +'<img class="thumb" data-thumb="'+key+'"></div>';
}
function secSummary(title, icoKey, toggleKey){
  var sw = toggleKey ? '<span class="switch" data-toggle="'+toggleKey+'"></span>' : '';
  return '<summary><span class="sec-ico">'+(ICONS[icoKey]||ICONS.star)+'</span>'+esc(title)+sw
    +'<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></summary>';
}

function renderForm(){
  var f = document.getElementById('form');
  var h = '';

  /* Page & sharing */
  h += '<details class="acc" open>'+secSummary('Page & sharing','gavel',null)
    +'<div class="acc-body">'
    + field('Internal name (for your records)','name','v','Autumn Auction 2025')
    + '<div class="fld"><label>Languages shown on the page</label>'
      +'<div class="langpick" id="langPick">'
        +'<button type="button" data-lp="en">EN</button>'
        +'<button type="button" data-lp="tc">繁體</button>'
        +'<button type="button" data-lp="sc">简体</button>'
      +'</div><div class="hint">Pick which languages the downloaded page offers. The first selected is the default; one language = no switcher shown.</div></div>'

/* ---- bind static fields ---- */
function wireForm(){
  var f = document.getElementById('form');

  f.querySelectorAll('[data-tx]').forEach(function(el){
    el.addEventListener('input', function(){
      var k = el.getAttribute('data-tx');
      ensureTx(k); S.tx[k][curLang] = el.value; schedule();
    });
  });
  f.querySelectorAll('[data-v]').forEach(function(el){
    el.addEventListener('input', function(){
      var k = el.getAttribute('data-v');
      S[k] = el.value; schedule();
    });
  });
  f.querySelectorAll('[data-toggle]').forEach(function(sw){
    sw.addEventListener('click', function(e){
      e.stopPropagation();
      var k = sw.getAttribute('data-toggle');
      S.on[k] = !S.on[k];
      sw.classList.toggle('on', S.on[k]);
      if(S.on[k]){ var det = sw.closest('details'); if(det) det.open = true; }
      schedule();
    });
  });
  f.querySelectorAll('[data-up]').forEach(function(btn){
    btn.addEventListener('click', function(){ pickImage(btn.getAttribute('data-up')); });
  });
  f.querySelectorAll('[data-add]').forEach(function(btn){
    btn.addEventListener('click', function(){ addRow(btn.getAttribute('data-add')); });
  });

  document.getElementById('btnExport').addEventListener('click', exportBackup);
  document.getElementById('btnImport').addEventListener('click', function(){ document.getElementById('importFile').click(); });
  document.getElementById('importFile').addEventListener('change', importBackup);

  var bcs=document.getElementById('btnCloudSave');
  if(bcs){
    bcs.addEventListener('click', cloudSave);
    document.getElementById('btnCloudRefresh').addEventListener('click', cloudList);
    document.getElementById('btnCloudLoad').addEventListener('click', cloudLoad);
  }

  var lp=document.getElementById('langPick');
  if(lp){
    lp.querySelectorAll('[data-lp]').forEach(function(b){
      b.addEventListener('click', function(){ toggleLang(b.getAttribute('data-lp')); });
    });
  }
}
function toggleLang(l){
  if(!S.langs) S.langs = ['en','tc','sc'];
  var i = S.langs.indexOf(l);
  if(i>-1){ if(S.langs.length>1) S.langs.splice(i,1); }   /* keep at least one */
  else { S.langs.push(l); }
  /* keep canonical order en,tc,sc */
  S.langs = ['en','tc','sc'].filter(function(x){ return S.langs.indexOf(x)>-1; });
  syncForm(); schedule();
}
function ensureTx(k){ if(!S.tx[k]) S.tx[k]=mk(); }

/* ---- push state values into inputs for the current language ---- */
function syncForm(){
  var f = document.getElementById('form');
  f.querySelectorAll('[data-tx]').forEach(function(el){
    var k = el.getAttribute('data-tx'); ensureTx(k);
    el.value = cur(S.tx[k]);
    var ex = PRESETS[curType] && PRESETS[curType].tx[k];
    if(el.value==='' && ex) el.placeholder = resolve(ex, curLang) || resolve(ex,'en') || el.placeholder;
  });
  f.querySelectorAll('[data-v]').forEach(function(el){
    var k = el.getAttribute('data-v');
    el.value = (S[k]!=null)?S[k]:'';
  });
  f.querySelectorAll('[data-toggle]').forEach(function(sw){
    sw.classList.toggle('on', !!S.on[sw.getAttribute('data-toggle')]);
  });
  f.querySelectorAll('[data-thumb]').forEach(function(img){
    var k = img.getAttribute('data-thumb'); var v = S[k];
    if(v){ img.src = v; img.style.display='block'; } else { img.style.display='none'; }
  });
  f.querySelectorAll('[data-langbadge]').forEach(function(b){
    b.textContent = (curLang==='en'?'EN':(curLang==='tc'?'繁':'简'));
  });
  var lpEl = document.getElementById('langPick');
  if(lpEl){
    var lgs = (S.langs && S.langs.length) ? S.langs : ['en','tc','sc'];
    lpEl.querySelectorAll('[data-lp]').forEach(function(b){
      b.classList.toggle('on', lgs.indexOf(b.getAttribute('data-lp'))>-1);
    });
  }
}

/* ============================================================================
   BACKEND TRANSPORT — reads via JSONP, writes via no-cors (sidesteps CORS)
============================================================================ */
function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }
function rid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function ensureId(){ if(!S.id) S.id = 'p_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); return S.id; }
function jsonp(base, params){
  return new Promise(function(res,rej){
    var cb = 'ack_jp_'+(jsonp._n=(jsonp._n||0)+1);
    var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
    var s = document.createElement('script');
    var to = setTimeout(function(){ cleanup(); rej(new Error('timeout')); }, 20000);
    function cleanup(){ clearTimeout(to); try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if(s.parentNode) s.parentNode.removeChild(s); }
    window[cb] = function(data){ cleanup(); res(data); };
    s.onerror = function(){ cleanup(); rej(new Error('jsonp error')); };
    s.src = base + (base.indexOf('?')>-1?'&':'?') + qs + '&callback=' + cb;
    document.head.appendChild(s);
  });
}
function postNoCors(base, body){
  return fetch(base, {method:'POST', mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(body)});
}

async function cloudSave(){
  if(!BRAND.backendUrl){ setStatus('No backend configured.'); return; }
  ensureId();
  var name = S.name || resolve(S.tx.hlBold,'en') || 'Untitled';
  setStatus('Saving to cloud\u2026');
  try{
    await postNoCors(BRAND.backendUrl, {action:'save', id:S.id, name:name, type:curType,
      json: JSON.stringify({type:curType, state:S})});
    setStatus('Saved to cloud.');
    setTimeout(cloudList, 600);
  }catch(e){ setStatus('Save failed \u2014 check the backend URL.'); }
}
async function cloudList(){
  if(!BRAND.backendUrl) return;
  var sel = document.getElementById('cloudSel'); if(!sel) return;
  try{
    var r = await jsonp(BRAND.backendUrl, {action:'list'});
    var pages = (r&&r.pages)||[];
    sel.innerHTML = '<option value="">\u2014 saved pages \u2014</option>' + pages.map(function(p){
      return '<option value="'+escAttr(p.id)+'">'+esc(p.name||p.id)+(p.type?' \u00b7 '+esc(p.type):'')+'</option>';
    }).join('');
  }catch(e){ setStatus('Could not reach the cloud.'); }
}
async function cloudLoad(){
  var sel = document.getElementById('cloudSel'); if(!sel || !sel.value) return;
  setStatus('Loading\u2026');
  try{
    var r = await jsonp(BRAND.backendUrl, {action:'load', id: sel.value});
    if(r && r.page){
      var obj = (typeof r.page.json==='string') ? JSON.parse(r.page.json) : r.page.json;
      if(obj && obj.state){
        S = obj.state; curType = obj.type || S.type || 'auction';
        if(!S.id) S.id = r.page.id;
        setType(curType, true);
        setStatus('Loaded from cloud.');
        return;
      }
    }
    setStatus('Could not load that page.');
  }catch(e){ setStatus('Load failed.'); }
}

/* ============================================================================
   IMAGES — when a backend is on, uploads go to your Drive folder and the page
   stores the Drive URL (keeps cloud-saved JSON small). With no backend, the
   image is embedded as a data: URI. Either way it is baked in on download.
============================================================================ */
function fileToDataUrl(file, cb){
  var r = new FileReader();
  r.onload = function(){ cb(r.result); };
  r.readAsDataURL(file);
}
async function uploadToDrive(dataUrl, nameHint){
  ensureId();
  var token = rid();
  await postNoCors(BRAND.backendUrl, {action:'upload', token:token, project:S.id,
    pname:(S.name||resolve(S.tx.hlBold,'en')||''), name:(nameHint||'image'), data:dataUrl});
  for(var i=0;i<30;i++){
    await sleep(800);
    try{ var r = await jsonp(BRAND.backendUrl, {action:'uploadstatus', token:token}); if(r && r.url) return r.url; }catch(e){}
  }
  return null;
}
function placeImage(setter, file){
  fileToDataUrl(file, function(d){
    if(BRAND.backendUrl){
      setter(d); setStatus('Uploading to Drive\u2026');   /* show embedded copy immediately */
      uploadToDrive(d, file.name).then(function(url){
        if(url){ setter(url); setStatus('Image stored in Drive.'); }
        else setStatus('Drive upload slow \u2014 kept embedded copy.');
      }).catch(function(){ setStatus('Drive upload failed \u2014 kept embedded copy.'); });
    } else {
      setter(d);
    }
  });
}
function pickImage(key){
  var inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange = function(){ if(inp.files[0]) placeImage(function(v){ S[key]=v; syncForm(); schedule(); }, inp.files[0]); };
  inp.click();
}
function pickImageRow(list,i,field){
  var inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange = function(){ if(inp.files[0]) placeImage(function(v){ S[list][i][field]=v; renderRows(list); schedule(); }, inp.files[0]); };
  inp.click();
}

/* embed remote <img>/background URLs on download.
   Order: direct fetch -> backend imgdata (by Drive id) -> wsrv.nl proxy -> backend server fetch. */
function blobToDataUrl(b){ return new Promise(function(res,rej){ var r=new FileReader(); r.onload=function(){res(r.result);}; r.onerror=rej; r.readAsDataURL(b); }); }
function viaProxy(u){
  var clean = u.replace(/^https?:\/\//,'');
  return fetch('https://wsrv.nl/?url='+encodeURIComponent(clean)).then(function(r){ return r.blob(); }).then(blobToDataUrl);
}
function driveId(u){ var m = u.match(/[?&]id=([^&]+)/) || u.match(/\/d\/([^/]+)/); return m ? m[1] : ''; }
async function embedRemote(html){
  var set = {};
  var re = /(?:src\s*=\s*["']?|url\(\s*["']?)(https?:\/\/[^"')\s]+)/g, m;
  while((m=re.exec(html))){ set[m[1]]=1; }
  var urls = Object.keys(set), failed=0;
  for(var i=0;i<urls.length;i++){
    var u=urls[i], d=null;
    try{ var b=await (await fetch(u,{mode:'cors'})).blob(); d=await blobToDataUrl(b); }catch(e){}
    if(!d && BRAND.backendUrl){
      var id = driveId(u);
      if(id){ try{ var r=await jsonp(BRAND.backendUrl,{action:'imgdata',id:id}); if(r&&r.data) d=r.data; }catch(e){} }
    }
    if(!d){ try{ d=await viaProxy(u); }catch(e){} }
    if(!d && BRAND.backendUrl){ try{ var r2=await jsonp(BRAND.backendUrl,{action:'fetch',url:u}); if(r2&&r2.data) d=r2.data; }catch(e){} }
    if(d){ html = html.split(u).join(d); } else { failed++; }
  }
  return {html:html, failed:failed, total:urls.length};
}

============================================================================ */
function setStatus(t){ var s=document.getElementById('status'); s.textContent=t; if(t) setTimeout(function(){ if(s.textContent===t) s.textContent=''; },4000); }
function slug(){ var n=(S.name||resolve(S.tx.hlBold,'en')||'acker-page'); return n.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'acker-page'; }

async function doDownload(){
  setStatus('Embedding images…');
  var html = buildPage(S);
  var r = await embedRemote(html);
  if(r.failed) setStatus(r.failed+' of '+r.total+' remote image(s) could not embed — upload them instead.');
  else setStatus('Downloaded.');
  var blob = new Blob([r.html], {type:'text/html'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = slug()+'.html';
  document.body.appendChild(a); a.click(); a.remove();
}
async function doCopy(){
  var html = buildPage(S);
  var r = await embedRemote(html);
  try{ await navigator.clipboard.writeText(r.html); setStatus('HTML copied to clipboard.'); }
  catch(e){ setStatus('Copy blocked — use Download instead.'); }
}
function doClear(){
  /* keep structure (type, heroStyle, toggles, footer/contact), blank campaign text & images */
  Object.keys(S.tx).forEach(function(k){
    if(k==='ftAddr') return;
    S.tx[k] = mk();
  });
  S.heroImg=''; S.partnerLogo=''; S.offerCode='';
  ['wines','highlights','agenda','hosts'].forEach(function(l){
    (S[l]||[]).forEach(function(it){
      Object.keys(it).forEach(function(fk){
        if(it[fk] && typeof it[fk]==='object') it[fk]=mk();
        else if(fk!=='icon') it[fk]='';
      });
    });
  });
  syncForm(); renderAllRows(); render();
  setStatus('Fields cleared — structure kept.');
}
function exportBackup(){
  var data = JSON.stringify({type:curType, state:S}, null, 2);
  var blob = new Blob([data], {type:'application/json'});
  var a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=slug()+'-backup.json';
  document.body.appendChild(a); a.click(); a.remove();
  setStatus('Backup downloaded.');
}
function importBackup(e){
  var file = e.target.files[0]; if(!file) return;
  var r = new FileReader();
  r.onload = function(){
    try{
      var obj = JSON.parse(r.result);
      if(obj.state){ S = obj.state; curType = obj.type || S.type || 'auction'; }
      setType(curType, true);
      setStatus('Backup imported.');
    }catch(err){ setStatus('Could not read that backup file.'); }
  };
  r.readAsText(file);
  e.target.value='';
}

/* ============================================================================
   TYPE / LANG / DEVICE SWITCHING + INIT
============================================================================ */
function setType(type, keepState){
  curType = type;
  document.querySelectorAll('#typeSwitch button').forEach(function(b){
    b.classList.toggle('on', b.getAttribute('data-type')===type);
  });
  if(!keepState) loadPreset(type);
  syncForm(); renderAllRows(); render();
}
function setLang(l){
  curLang = l;
  document.querySelectorAll('#langSwitch button').forEach(function(b){
    b.classList.toggle('on', b.getAttribute('data-lang')===l);
  });
  var fm = document.getElementById('form');
  if(fm) fm.setAttribute('lang', l==='en'?'en':(l==='tc'?'zh-Hant':'zh-Hans'));
  syncForm(); renderAllRows();
}
function setDev(d){
  curDev = d;
  document.querySelectorAll('#devTabs button').forEach(function(b){
    b.classList.toggle('on', b.getAttribute('data-dev')===d);
  });
  document.getElementById('frameShell').classList.toggle('mobile', d==='mobile');
}

function init(){
  document.getElementById('tbLogo').innerHTML = LOGO_WHITE;
  loadPreset('auction');
  renderForm();

  document.querySelectorAll('#typeSwitch button').forEach(function(b){
    b.addEventListener('click', function(){ setType(b.getAttribute('data-type')); });
  });
  document.querySelectorAll('#langSwitch button').forEach(function(b){
    b.addEventListener('click', function(){ setLang(b.getAttribute('data-lang')); });
  });
  document.querySelectorAll('#devTabs button').forEach(function(b){
    b.addEventListener('click', function(){ setDev(b.getAttribute('data-dev')); });
  });
  document.getElementById('btnDownload').addEventListener('click', doDownload);
  document.getElementById('btnCopy').addEventListener('click', doCopy);
  document.getElementById('btnClear').addEventListener('click', doClear);

  render();
  if(BRAND.backendUrl) cloudList();
}
document.addEventListener('DOMContentLoaded', init);
</script>
